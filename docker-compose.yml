# =============================================================================
# Configuração Docker Compose para Hummingbot API, EMQX, PostgreSQL, MCP Server e Condor
# =============================================================================
#
# Este arquivo define a infraestrutura para o ambiente MCP_Axodus_Trading com:
# - Hummingbot API: Gerenciamento de bots de trading
# - EMQX: Broker MQTT para comunicação em tempo real
# - PostgreSQL: Banco de dados para armazenamento de dados
# - MCP Server: Servidor MCP para orquestração
# - Condor: Serviço de trading automatizado

services:
  hummingbot-api:
    container_name: hummingbot-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./bots:/hummingbot-api/bots
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env.hummingbot
    environment:
      # Override specific values for Docker networking
      - BROKER_HOST=emqx
      - GATEWAY_URL=http://host.docker.internal:15888
    extra_hosts:
      # Map host.docker.internal to host gateway for Linux compatibility
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_started
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 1

  emqx:
    container_name: hummingbot-broker
    image: emqx:5
    restart: unless-stopped
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=node1.emqx.local
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.local]
      - EMQX_LOADED_PLUGINS="emqx_recon,emqx_retainer,emqx_management,emqx_dashboard"
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${MQTT_PASSWORD}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
      - emqx-etc:/opt/emqx/etc
    ports:
      - "1883:1883"
      - "8083:8083"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 5s
      timeout: 25s
      retries: 5

  postgres:
    container_name: hummingbot-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCP Server service
  mcp-server:
    container_name: mcp-server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "15888:15888"
    env_file:
      - .env.mcp
    depends_on:
      hummingbot-api:
        condition: service_healthy

  # Condor service
  condor:
    container_name: condor
    image: hummingbot/condor:latest
    env_file:
      - .env.condor
    environment:
      - BROKER_HOST=emqx
    depends_on:
      hummingbot-api:
        condition: service_healthy
      emqx:
        condition: service_started

volumes:
  emqx-data: { }
  emqx-log: { }
  emqx-etc: { }
  postgres-data: { }
  mcp-data: { }
  condor-data: { }
